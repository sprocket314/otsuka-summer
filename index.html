<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ōtsuka Summer — A Tokyo Field Guide</title>
<meta name="description" content="Our family's month in Tokyo, July–August 2026. Based at Ōtsuka. Every recommendation with full logistics.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;600;700;900&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<style>
  :root{
    --ink:#111830;          /* deep indigo night */
    --ink-2:#1B2647;
    --paper:#EDEEE6;        /* cool ivory / tatami */
    --surface:#FBFBF7;
    --lantern:#C8402E;      /* matsuri vermilion */
    --lantern-dim:#9E3122;
    --gold:#C79A46;         /* aged brass */
    --muted:#5B647A;
    --line:rgba(17,24,48,.14);
    --line-strong:rgba(17,24,48,.28);
    --board:#0C1226;        /* departure board */
    --board-text:#F4E7B8;
    --ok:#2E6E4E;
    --shadow:0 1px 0 rgba(17,24,48,.05), 0 14px 34px -18px rgba(17,24,48,.35);
    --r:14px;
    --maxw:960px;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Zen Kaku Gothic New",system-ui,-apple-system,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  img{max-width:100%;display:block}

  /* ---------- top bar ---------- */
  header.top{
    position:sticky;top:0;z-index:50;background:var(--ink);color:var(--paper);
    border-bottom:2px solid var(--gold);
  }
  .top-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:14px;
    padding:11px 18px;}
  .brand{display:flex;align-items:center;gap:11px;cursor:pointer;text-decoration:none;color:var(--paper);
    background:none;border:0;padding:0;font:inherit}
  .stamp{width:38px;height:38px;flex:0 0 auto;border:1.5px solid var(--lantern);border-radius:8px;
    display:grid;place-items:center;color:var(--board-text);background:rgba(200,64,46,.10);
    font-family:"Zen Old Mincho",serif;font-weight:700;font-size:20px;line-height:1}
  .brand b{font-family:"Zen Old Mincho",serif;font-weight:700;font-size:16px;letter-spacing:.2px;display:block}
  .brand span{font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.14em;color:var(--gold);
    text-transform:uppercase}
  .top nav{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap}
  .top nav a{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.05em;text-decoration:none;
    color:var(--paper);opacity:.82;padding:7px 9px;border-radius:8px;white-space:nowrap}
  .top nav a:hover{opacity:1;background:rgba(255,255,255,.08)}
  .top nav a.on{opacity:1;color:var(--board-text);background:rgba(199,154,70,.14)}
  .menu-btn{display:none}

  main{max-width:var(--maxw);margin:0 auto;padding:0 18px 90px}

  /* ---------- home hero (departure board) ---------- */
  .hero{margin:22px 0 30px;border-radius:var(--r);overflow:hidden;background:var(--ink);color:var(--paper);
    box-shadow:var(--shadow);position:relative}
  .hero .eyebrow{font-family:"Space Mono",monospace;font-size:11.5px;letter-spacing:.22em;color:var(--gold);
    text-transform:uppercase;margin:0 0 10px}
  .hero-in{padding:34px 26px 30px}
  .hero h1{font-family:"Zen Old Mincho",serif;font-weight:900;line-height:1.02;margin:0 0 14px;
    font-size:clamp(30px,7vw,54px)}
  .hero h1 .jp{display:block;font-size:.5em;color:var(--board-text);font-weight:600;letter-spacing:.04em;margin-top:6px}
  .hero p.lead{max-width:52ch;color:#D6DAE6;margin:0 0 20px;font-size:15.5px}
  .board{background:var(--board);border:1px solid rgba(199,154,70,.4);border-radius:10px;
    font-family:"Space Mono",monospace;color:var(--board-text);overflow:hidden}
  .board .row{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
    padding:11px 15px;border-bottom:1px dashed rgba(199,154,70,.22);font-size:13px}
  .board .row:last-child{border-bottom:0}
  .board .rt{color:#8EA0C8}
  .board .rc{color:var(--lantern);font-weight:700}
  .board .rd{text-align:right;color:#EFE3B4}

  .chips{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 4px}
  .chip{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.04em;padding:5px 10px;border-radius:999px;
    border:1px solid rgba(255,255,255,.25);color:#E7EAF2;text-decoration:none}
  .chip:hover{border-color:var(--gold);color:#fff}

  /* ---------- section headings ---------- */
  .sec-head{display:flex;align-items:baseline;gap:12px;margin:34px 0 15px}
  .sec-head .n{font-family:"Space Mono",monospace;color:var(--lantern);font-size:13px;font-weight:700}
  .sec-head h2{font-family:"Zen Old Mincho",serif;font-size:clamp(20px,4.5vw,26px);margin:0;font-weight:700}
  .sec-head .sub{margin-left:auto;color:var(--muted);font-size:12.5px;font-family:"Space Mono",monospace}

  /* ---------- category grid (home) ---------- */
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
  .cat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 14px;
    text-decoration:none;color:inherit;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
    display:flex;flex-direction:column;gap:6px;min-height:118px}
  .cat:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:var(--shadow)}
  .cat .kanji{font-family:"Zen Old Mincho",serif;font-size:26px;color:var(--lantern);line-height:1}
  .cat h3{margin:2px 0 0;font-size:16px;font-family:"Zen Kaku Gothic New";font-weight:700}
  .cat p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.45}
  .cat .count{margin-top:auto;font-family:"Space Mono",monospace;font-size:11px;color:var(--gold);letter-spacing:.06em}

  /* ---------- place cards (category list) ---------- */
  .cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
    text-decoration:none;color:inherit;display:flex;flex-direction:column;
    transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--line-strong)}
  .card .cbody{padding:15px 16px 16px;display:flex;flex-direction:column;gap:7px;flex:1}
  .card .ctop{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .card h3{margin:0;font-size:17px;font-weight:700}
  .card .jp{font-family:"Zen Old Mincho",serif;color:var(--muted);font-size:12.5px}
  .card p{margin:0;color:#3a4256;font-size:13.5px;flex:1}
  .card .meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:2px}
  .mono{font-family:"Space Mono",monospace}
  .time-badge{font-family:"Space Mono",monospace;font-size:11px;background:var(--ink);color:var(--board-text);
    padding:3px 8px;border-radius:6px;letter-spacing:.03em;white-space:nowrap}
  .tag{font-size:10.5px;font-family:"Space Mono",monospace;letter-spacing:.03em;padding:3px 8px;border-radius:999px;
    border:1px solid var(--line-strong);color:var(--muted)}
  .tag.you{border-color:#3a5aa8;color:#2f4c93}
  .tag.wife{border-color:var(--lantern);color:var(--lantern-dim)}
  .tag.kids{border-color:#3f8f5f;color:#2c6f47}
  .tag.family{border-color:var(--gold);color:#8a6a1f}

  /* ---------- detail page ---------- */
  .back{display:inline-flex;align-items:center;gap:7px;margin:20px 0 0;font-family:"Space Mono",monospace;
    font-size:12px;letter-spacing:.05em;text-decoration:none;color:var(--muted)}
  .back:hover{color:var(--lantern)}
  .detail-hero{margin:14px 0 22px;background:var(--ink);border-radius:var(--r);color:var(--paper);
    box-shadow:var(--shadow);overflow:hidden}
  .dh-in{padding:24px 24px 22px}
  .dh-cat{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold)}
  .dh-in h1{font-family:"Zen Old Mincho",serif;font-size:clamp(24px,5.5vw,38px);margin:8px 0 3px;line-height:1.05}
  .dh-jp{font-family:"Zen Old Mincho",serif;color:var(--board-text);font-size:15px;margin-bottom:14px}
  .depart{background:var(--board);border:1px solid rgba(199,154,70,.4);border-radius:10px;padding:12px 14px;
    font-family:"Space Mono",monospace;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center}
  .depart .from,.depart .to{min-width:0}
  .depart .lbl{font-size:9.5px;letter-spacing:.16em;color:#8EA0C8;text-transform:uppercase}
  .depart .st{font-size:15px;color:var(--board-text);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .depart .arrow{color:var(--lantern);font-size:18px;display:flex;flex-direction:column;align-items:center;line-height:1}
  .depart .arrow small{font-size:9px;color:#8EA0C8;letter-spacing:.05em;margin-top:3px;white-space:nowrap}
  .dh-tags{display:flex;gap:7px;flex-wrap:wrap;margin-top:14px}
  .dh-tags .tag{border-color:rgba(255,255,255,.28);color:#E7EAF2}

  .spec{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .spec .line{display:grid;grid-template-columns:132px 1fr;gap:16px;padding:14px 18px;border-bottom:1px solid var(--line);
    align-items:start}
  .spec .line:last-child{border-bottom:0}
  .spec .k{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
    padding-top:2px}
  .spec .v{font-size:14.5px;color:#26304a}
  .spec .v b{color:var(--ink)}
  .spec ul{margin:0;padding-left:18px}
  .spec ul li{margin:3px 0}

  .confirm{margin:14px 0 0;background:rgba(200,64,46,.07);border:1px solid rgba(200,64,46,.28);
    border-radius:12px;padding:12px 15px;font-size:13px;color:var(--lantern-dim);display:flex;gap:10px}
  .confirm b{color:var(--lantern-dim)}
  .confirm .i{font-family:"Zen Old Mincho",serif;font-weight:700;flex:0 0 auto}

  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 8px}
  .btn{font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.02em;text-decoration:none;
    padding:11px 16px;border-radius:10px;display:inline-flex;align-items:center;gap:8px;border:1px solid transparent;
    transition:transform .12s ease,filter .12s ease}
  .btn:hover{transform:translateY(-1px)}
  .btn.map{background:var(--lantern);color:#fff}
  .btn.map:hover{filter:brightness(1.06)}
  .btn.site{background:transparent;border-color:var(--line-strong);color:var(--ink)}
  .btn.site:hover{border-color:var(--ink)}

  .related{margin-top:34px}

  /* ---------- generic info blocks ---------- */
  .prose{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px 22px;
    max-width:70ch}
  .prose h3{font-family:"Zen Old Mincho",serif;margin:20px 0 8px;font-size:18px}
  .prose h3:first-child{margin-top:0}
  .prose p{margin:0 0 12px;font-size:14.5px}
  .prose code{font-family:"Space Mono",monospace;background:var(--paper);padding:2px 6px;border-radius:5px;font-size:12.5px}
  .steps{counter-reset:s;list-style:none;padding:0;margin:0}
  .steps li{counter-increment:s;position:relative;padding:0 0 14px 40px;font-size:14.5px}
  .steps li::before{content:counter(s);position:absolute;left:0;top:-2px;width:26px;height:26px;border-radius:8px;
    background:var(--ink);color:var(--board-text);font-family:"Space Mono",monospace;font-size:13px;
    display:grid;place-items:center}
  .steps li b{display:block;font-family:"Zen Kaku Gothic New";font-weight:700;color:var(--ink)}

  footer{max-width:var(--maxw);margin:0 auto;padding:26px 18px 40px;color:var(--muted);font-size:12px;
    border-top:1px solid var(--line);font-family:"Space Mono",monospace;letter-spacing:.02em}
  footer a{color:var(--lantern-dim)}

  .empty{padding:40px;text-align:center;color:var(--muted)}

  @media (max-width:640px){
    .top nav{display:none;position:absolute;top:100%;left:0;right:0;background:var(--ink-2);flex-direction:column;
      padding:8px;gap:2px;border-bottom:2px solid var(--gold)}
    .top nav.open{display:flex}
    .top nav a{padding:11px 12px}
    .menu-btn{display:inline-flex;margin-left:auto;background:none;border:1px solid rgba(255,255,255,.3);color:var(--paper);
      border-radius:8px;padding:7px 11px;font-family:"Space Mono",monospace;font-size:12px;cursor:pointer}
    .spec .line{grid-template-columns:1fr;gap:4px;padding:13px 15px}
    .depart{grid-template-columns:1fr auto 1fr;gap:6px}
    .depart .st{font-size:13px}
    .hero-in,.dh-in{padding:24px 18px 22px}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .fade{animation:fade .4s ease both}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  :focus-visible{outline:2.5px solid var(--lantern);outline-offset:2px;border-radius:4px}

  /* ---------- eat-nearby (on a place page) ---------- */
  .eat{margin:20px 0 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .eat .eh{display:flex;align-items:baseline;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line);
    background:rgba(46,110,78,.07)}
  .eat .eh h3{margin:0;font-family:"Zen Old Mincho",serif;font-size:16px}
  .eat .eh .kj{color:var(--ok);font-family:"Zen Old Mincho",serif}
  .eat .eh .by{margin-left:auto;font-family:"Space Mono",monospace;font-size:10.5px;color:var(--muted);letter-spacing:.03em}
  .eat .note{padding:9px 18px;font-size:12px;color:var(--muted);border-bottom:1px solid var(--line);background:rgba(199,154,70,.05)}
  .rrow{display:flex;gap:12px;align-items:center;padding:11px 18px;border-bottom:1px solid var(--line);
    text-decoration:none;color:inherit}
  .rrow:last-child{border-bottom:0}
  .rrow:hover{background:rgba(17,24,48,.03)}
  .rrow .rmain{flex:1;min-width:0}
  .rrow .rmain b{font-weight:700;font-size:14.5px}
  .rrow .rsub{color:var(--muted);font-size:12px;font-family:"Space Mono",monospace;margin-top:1px}
  .rrow .rsub .star{color:var(--gold)}
  .rrow .rd{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex:0 0 auto}
  .dist{font-family:"Space Mono",monospace;font-size:11px;background:var(--ink);color:var(--board-text);
    padding:2px 8px;border-radius:6px;white-space:nowrap}
  .rd .go{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--lantern-dim);white-space:nowrap}

  /* ---------- dining page (restaurant grid) ---------- */
  .areahead{grid-column:1/-1;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.08em;
    color:var(--lantern);text-transform:uppercase;margin:16px 0 0;border-bottom:1px solid var(--line);padding-bottom:6px}
  .rcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px;
    display:flex;flex-direction:column;gap:5px;text-decoration:none;color:inherit;
    transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
  .rcard:hover{transform:translateY(-2px);border-color:var(--line-strong);box-shadow:var(--shadow)}
  .rcard .rt{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .rcard h4{margin:0;font-size:15px;font-weight:700}
  .rcard .a{font-family:"Space Mono",monospace;font-size:10.5px;color:var(--gold);white-space:nowrap;letter-spacing:.04em}
  .rcard .c{color:var(--muted);font-size:12.5px}
  .rcard .m{font-family:"Space Mono",monospace;font-size:11.5px;color:#26304a;margin-top:2px;display:flex;
    gap:8px;flex-wrap:wrap;align-items:center}
  .rcard .m .star{color:var(--gold)}

  /* ---------- map ---------- */
  .mapwrap{width:100%;height:min(72vh,600px);border-radius:var(--r);overflow:hidden;
    border:1px solid var(--line-strong);background:#dfe3e8}
  .mapwrap iframe{width:100%;height:100%;border:0;display:block}
  #map{height:min(70vh,580px);width:100%;border-radius:var(--r);border:1px solid var(--line-strong);z-index:0;
    background:#dfe3e8}
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin:12px 0 4px;font-family:"Space Mono",monospace;
    font-size:12px;color:var(--muted)}
  .legend .d{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;
    border:2px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .leaflet-popup-content{font-family:"Zen Kaku Gothic New",sans-serif;font-size:13px;line-height:1.5;margin:12px 14px}
  .leaflet-popup-content b{font-family:"Zen Old Mincho",serif;font-size:14px}
  .leaflet-popup-content a{color:var(--lantern-dim);font-family:"Space Mono",monospace;font-size:12px}
  .kml{margin:16px 0 0;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px}
  .kml h3{margin:0 0 8px;font-family:"Zen Old Mincho",serif;font-size:16px}
  .kml p{margin:0 0 8px;font-size:13.5px;color:#3a4256}
  .kml ol{margin:6px 0 0;padding-left:20px;font-size:13.5px}
  .kml code{font-family:"Space Mono",monospace;background:var(--paper);padding:2px 6px;border-radius:5px;font-size:12px}

  /* ---------- card actions: calendar + photos ---------- */
  .cfoot{margin-top:9px;display:flex;gap:7px;flex-wrap:wrap}
  .cal-btn,.photos-btn{font:inherit;cursor:pointer}
  .cal-btn.chip{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.03em;
    background:rgba(200,64,46,.07);border:1px solid rgba(200,64,46,.28);color:var(--lantern-dim);
    padding:5px 11px;border-radius:999px}
  .cal-btn.chip:hover{background:rgba(200,64,46,.14);border-color:var(--lantern)}
  .photos-btn.chip{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.03em;
    background:rgba(17,24,48,.05);border:1px solid var(--line-strong);color:var(--muted);
    padding:5px 11px;border-radius:999px}
  .photos-btn.chip:hover{border-color:var(--ink);color:var(--ink)}
  .btn.cal{background:var(--ink);color:var(--board-text)}
  .btn.cal:hover{filter:brightness(1.12)}
  .btn.photos{background:transparent;border-color:var(--line-strong);color:var(--ink)}
  .btn.photos:hover{border-color:var(--ink)}
  .cal-quick{display:flex;flex-direction:column;gap:8px}
  .cal-quick .qbtn{text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:10px;
    padding:11px 13px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer}
  .cal-quick .qbtn span{font-family:"Space Mono",monospace;font-weight:400;font-size:11.5px;color:var(--lantern-dim)}
  .cal-quick .qbtn:hover{border-color:var(--line-strong);background:#fff}

  .modal-back{position:fixed;inset:0;background:rgba(17,24,48,.55);z-index:100;display:flex;
    align-items:center;justify-content:center;padding:18px}
  .modal{background:var(--surface);border:1px solid var(--line-strong);border-radius:var(--r);
    max-width:440px;width:100%;padding:20px 20px 18px;box-shadow:var(--shadow);position:relative}
  .modal-x{position:absolute;top:8px;right:12px;background:none;border:0;font-size:24px;color:var(--muted);
    cursor:pointer;line-height:1}
  .modal-h{display:flex;align-items:baseline;gap:9px;margin:0 0 14px}
  .modal-h .kj{color:var(--lantern);font-family:"Zen Old Mincho",serif;font-size:19px}
  .modal-h h3{margin:0;font-family:"Zen Old Mincho",serif;font-size:18px}
  .modal label{display:block;font-family:"Space Mono",monospace;font-size:10.5px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--muted);margin-bottom:11px}
  .modal input{display:block;width:100%;margin-top:5px;padding:9px 10px;border:1px solid var(--line-strong);
    border-radius:8px;font:inherit;font-size:14px;background:var(--paper);color:var(--ink)}
  .modal-row{display:flex;gap:10px}
  .modal-row label{flex:1}
  .modal-warn{font-size:12.5px;line-height:1.5;color:#8a2b1f;background:rgba(200,64,46,.1);
    border:1px solid rgba(200,64,46,.38);border-radius:8px;padding:10px 12px;margin:0 0 15px}
  .modal-warn b{color:var(--lantern-dim)}
  .modal-hint{font-size:12px;color:var(--muted);margin:-4px 0 10px}
  .modal-note{font-size:12.5px;line-height:1.5;color:var(--lantern-dim);background:rgba(200,64,46,.07);
    border:1px solid rgba(200,64,46,.22);border-radius:8px;padding:9px 11px;margin:4px 0 15px}

/* =========================================================================
   SHARED CALENDAR  —  family Google Calendar "Ōtsuka Summer 2026".
   Change CAL_ID to point the site at a different calendar.
   ========================================================================= */
const CAL_ID = "d3ee878491e3ee19bf2b4c03ddae6077a6949573b958cdb6c2a1de19ea161e77@group.calendar.google.com";
const CAL_NAME = "Ōtsuka Summer 2026";
const CAL_TZ = "Asia/Tokyo";
const CAL_EMBED = "https://calendar.google.com/calendar/embed?src="+encodeURIComponent(CAL_ID)+
  "&ctz="+encodeURIComponent(CAL_TZ)+"&mode=MONTH&dates=20260701/20260731&wkst=2&hl=en&showTitle=0&showPrint=0&showTz=1";

const CAL_MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
// best-effort default date from a "14–16 Aug 2026"-style string; falls back to mid family-week
function guessDate(p){
  const m = ((p.dates||'')+'').match(/(\d{1,2})\s*[–-]?\s*\d*\s*([A-Za-z]{3})[a-z]*\.?\s*(\d{4})?/);
  if(m && CAL_MONTHS[m[2].toLowerCase()]!=null){
    const mo=CAL_MONTHS[m[2].toLowerCase()], y=m[3]?+m[3]:2026;
    return `${y}-${String(mo+1).padStart(2,'0')}-${String(+m[1]).padStart(2,'0')}`;
  }
  return "2026-08-08";
}
function defaultTimes(p){ return p.cat==='festivals' ? ["19:00","21:00"] : ["10:00","12:00"]; }
function calLoc(p){ return p.address || p.mapsDest || p.name; }
function calStamp(dateStr,timeStr){ return dateStr.replace(/-/g,'')+"T"+timeStr.replace(':','')+"00"; }
function gcalUrl(title,d,st,et,details,loc){
  const q = new URLSearchParams({action:"TEMPLATE", text:title,
    dates:calStamp(d,st)+"/"+calStamp(d,et), details, location:loc, ctz:CAL_TZ});
  return "https://calendar.google.com/calendar/render?"+q.toString();
}
function icsText(title,d,st,et,details,loc){
  const e = s=>(s||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
  const stamp = new Date().toISOString().replace(/[-:]/g,'').replace(/\.\d{3}/,'');
  return ["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Otsuka Summer//guide//EN","CALSCALE:GREGORIAN",
    "BEGIN:VEVENT","UID:otsuka-"+calStamp(d,st)+"@otsuka-summer","DTSTAMP:"+stamp,
    "DTSTART;TZID="+CAL_TZ+":"+calStamp(d,st),"DTEND;TZID="+CAL_TZ+":"+calStamp(d,et),
    "SUMMARY:"+e(title),"DESCRIPTION:"+e(details),"LOCATION:"+e(loc),
    "END:VEVENT","END:VCALENDAR"].join("\r\n");
}
function escAttr(s){ return esc(s).replace(/"/g,'&quot;'); }

// "Add to calendar" dialog: pick date + time, then Google Calendar link or .ics
function openCalModal(pid){
  const p = PLACES.find(x=>x.id===pid); if(!p) return;
  const d0=guessDate(p), [st0,et0]=defaultTimes(p);
  const details = `${p.blurb||''}\n\nFrom the Ōtsuka Summer guide: https://sprocket314.github.io/otsuka-summer/#/p/${p.id}`;
  const wrap=document.createElement('div'); wrap.className='modal-back';
  wrap.innerHTML=`
    <div class="modal" role="dialog" aria-modal="true" aria-label="Add to calendar">
      <button class="modal-x" aria-label="Close">×</button>
      <div class="modal-h"><span class="kj">暦</span><h3>Add to calendar</h3></div>
      <div class="modal-warn">⚠️ On Google's screen, switch the calendar from <b>your name</b> to <b>“${esc(CAL_NAME)}”</b> before you press <b>Save</b> — otherwise it lands on your personal calendar, not the shared one.</div>
      <label>Event<input id="cm-title" type="text" value="${escAttr(p.name)}"></label>
      <label>Date<input id="cm-date" type="date" value="${d0}"></label>
      <div class="modal-row">
        <label>Start<input id="cm-start" type="time" value="${st0}"></label>
        <label>End<input id="cm-end" type="time" value="${et0}"></label>
      </div>
      ${p.dates?`<div class="modal-hint">Guide dates: <b>${esc(p.dates)}</b></div>`:''}
      <div class="modal-note">Times are Tokyo (${CAL_TZ}). Want a foolproof route instead? <b>Download .ics</b>, then in Google Calendar → Import, choose “${esc(CAL_NAME)}” as the target.</div>
      <div class="modal-actions">
        <a id="cm-g" class="btn map" target="_blank" rel="noopener">▷ Add to Google Calendar</a>
        <button id="cm-ics" class="btn site" type="button">⤓ Download .ics</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  const $=s=>wrap.querySelector(s);
  const vals=()=>[$('#cm-title').value||p.name,$('#cm-date').value,$('#cm-start').value,$('#cm-end').value];
  function refresh(){ const [t,d,s,e]=vals(); $('#cm-g').href=gcalUrl(t,d,s,e,details,calLoc(p)); }
  ['#cm-title','#cm-date','#cm-start','#cm-end'].forEach(s=>$(s).addEventListener('input',refresh));
  refresh();
  $('#cm-ics').addEventListener('click',()=>{
    const [t,d,s,e]=vals();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([icsText(t,d,s,e,details,calLoc(p))],{type:'text/calendar'}));
    a.download=(p.id||'event')+'.ics'; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  });
  const close=()=>{ wrap.remove(); document.removeEventListener('keydown',onKey); };
  function onKey(e){ if(e.key==='Escape') close(); }
  $('.modal-x').addEventListener('click',close);
  wrap.addEventListener('click',e=>{ if(e.target===wrap) close(); });
  document.addEventListener('keydown',onKey);
  $('#cm-title').focus();
}

function coverKanji(p){
  const jp=(p.jp||'').replace(/\s+/g,'');
  const cj=jp.match(/[぀-ヿ㐀-鿿豈-﫿]/g);
  if(cj&&cj.length) return cj.slice(0,2).join('');
  const c=CATEGORIES.find(x=>x.id===p.cat); return c?c.kanji:'旅';
}
function coverHTML(p){
  return `<div class="cover cov-${esc(p.cat)}" aria-hidden="true">

}

// "Eat nearby" — Rodrigo's closest picks to this activity
function eatNearbyHTML(p){
  const list = EAT[p.id];
  if(!list || !list.length) return '';
  const near = list[0].km, far = list[list.length-1].km;
  let note='';
  if(near>2.5) note = `Rodrigo's picks cluster in Minato &amp; Meguro (Roppongi · Azabu · Nakameguro · Ebisu). The nearest is ~${near} km away — a short hop south rather than truly local, but worth pairing with a trip down there.`;
  else if(near>1.2) note = `Rodrigo's closest picks are roughly ${near}–${far} km away — a stop or two on the train.`;
  const rows = list.map(e=>{
    const r = RESTAURANTS[e.i];
    return `<a class="rrow" href="${rMapsRoute(r)}" target="_blank" rel="noopener">
      <div class="rmain"><b>${esc(r.name)}</b>
        <div class="rsub">${esc(r.category)} · ${esc(r.area)} · ${stars(r.rating)}${r.price?' · '+esc(r.price):''}</div>
      </div>
      <div class="rd"><span class="dist">${e.km} km</span><span class="go">▷ route ↗</span></div>
    </a>`;
  }).join('');
  return `<div class="eat fade">
    <div class="eh"><span class="kj">食</span><h3>Eat nearby</h3><span class="by">${esc(EAT_CREDIT)}</span></div>

    <a class="rrow" href="#/map" style="color:var(--lantern-dim)"><div class="rmain"><b>See all of Rodrigo's picks on the map →</b></div></a>
  </div>`;
}

    <a class="back" href="#/">← Home</a>
    <div class="sec-head" style="margin-top:14px"><span class="n">食</span><h2>Rodrigo's food picks</h2><span class="sub">${tokyo.length} in Tokyo</span></div>
    <p style="max-width:64ch;color:var(--muted);margin:-6px 0 6px;font-size:14px">Your friend <b>Rodrigo Fernández</b>'s shared list, <i>«Sitios top en Japón»</i> — ${RESTAURANTS.length} places he frequents or recommends, sorted by area. Each activity page also surfaces the closest of these as an <b>“Eat nearby”</b> option, and they're all on the <a href="#/map" style="color:var(--lantern-dim)">map →</a>. Tap a card to open it in Google Maps.</p>
    <div class="cardgrid fade" style="margin-top:12px">${groups}</div>
    ${beyondHTML?`<div class="cardgrid fade" style="margin-top:6px">${beyondHTML}</div>`:''}
  `;
  window.scrollTo(0,0);
}

// ---------- combined map (our Google My Map, embedded) ----------
// ---------- combined map — built live from the guide's own data (auto-updates) ----------
function renderMap(){
  buildNav('map');
  const acts = PLACES.filter(p=>ACT_COORDS[p.id]);
  const foods = RESTAURANTS.filter(r=>r.tokyo&&r.coord);
  app.innerHTML = `
    <a class="back" href="#/">← Home</a>
    <div class="sec-head" style="margin-top:14px"><span class="n">地図</span><h2>Everything on one map</h2><span class="sub">guide + food</span></div>
    <p style="max-width:64ch;color:var(--muted);margin:-6px 0 12px;font-size:14px">Every place in this guide (<span style="color:var(--lantern)">red</span>) plus all of Rodrigo's food picks (<span style="color:var(--ok)">green</span>), around home base <span style="color:var(--gold)">Ōtsuka</span>. This map draws itself from the guide — add a place and it appears here automatically. Tap a pin for details.</p>
    <div id="map"></div>
    <div class="legend">
      <span><span class="d" style="background:#C79A46"></span>Ōtsuka (home)</span>
      <span><span class="d" style="background:#C8402E"></span>Things to do (${acts.length})</span>
      <span><span class="d" style="background:#2E6E4E"></span>Rodrigo's food (${foods.length})</span>
    </div>
    <div class="kml">
      <h3>Take it with you</h3>
      <p><a href="otsuka-map.kml" download>Download all pins (KML)</a> — import into Google My Maps, Apple Maps, or any map app for your own editable copy. (The KML is regenerated with the guide, so it stays current.)</p>
    </div>
  `;
  window.scrollTo(0,0);
  if(typeof L === 'undefined'){
    document.getElementById('map').innerHTML =
      '<div style="padding:30px;text-align:center;color:#5B647A">The map needs an internet connection to load its tiles — the KML download below still works offline.</div>';
    return;
  }
  const home = ACT_COORDS.otsuka;
  const map = L.map('map',{scrollWheelZoom:false}).setView([35.70,139.75],11);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',{
    maxZoom:19, attribution:'Tiles &copy; Esri'}).addTo(map);
  const pts=[];
  L.circleMarker(home,{radius:9,color:'#fff',weight:2,fillColor:'#C79A46',fillOpacity:1})
    .addTo(map).bindPopup('<b>Ōtsuka</b><br>Your home base — everything is measured from here.');
  pts.push(home);
  acts.forEach(p=>{
    const c = ACT_COORDS[p.id];
    L.circleMarker(c,{radius:6,color:'#fff',weight:1.5,fillColor:'#C8402E',fillOpacity:.95})
      .addTo(map)
      .bindPopup(`<b>${esc(p.name)}</b><br>${esc((CATEGORIES.find(x=>x.id===p.cat)||{}).name||'')}${p.time?' · '+esc(p.time):''}<br><a href="#/p/${p.id}">Open guide page →</a>${p.mapsDest?` · <a href="${photosUrl(p.mapsDest)}" target="_blank" rel="noopener">Photos ↗</a>`:''}`);
    pts.push(c);
  });
  foods.forEach(r=>{
    L.circleMarker(r.coord,{radius:5,color:'#fff',weight:1.2,fillColor:'#2E6E4E',fillOpacity:.9})
      .addTo(map)
      .bindPopup(`<b>${esc(r.name)}</b><br>${esc(r.category)} · ${esc(r.area)}<br>★${r.rating.toFixed(1)} (${r.reviews.toLocaleString()})${r.price?' · '+esc(r.price):''}<br><a href="${rMapsSearch(r)}" target="_blank" rel="noopener">Open in Google Maps ↗</a>`);
    pts.push(r.coord);
  });
  map.fitBounds(pts,{padding:[28,28]});
  setTimeout(()=>map.invalidateSize(),120);
}

// ---------- shared calendar page ----------

  buildNav('calendar');
  const dated = PLACES.filter(p=>p.dates);
  app.innerHTML = `
    <a class="back" href="#/">← Home</a>
    <div class="sec-head" style="margin-top:14px"><span class="n">暦</span><h2>Shared family calendar</h2><span class="sub">${esc(CAL_NAME)}</span></div>
    <p style="max-width:64ch;color:var(--muted);margin:-6px 0 12px;font-size:14px">One calendar the whole family shares. Add anything from the guide with its <b>📅 Add to calendar</b> button — pick a day &amp; time and it drops in here for everyone. Below are the fixed-date events for one-tap adding.</p>
    <div class="mapwrap"><iframe title="${esc(CAL_NAME)} shared calendar" loading="lazy" src="${CAL_EMBED}"></iframe></div>

    </div>

}

function renderAbout(){
  buildNav('about');
  app.innerHTML = `
    <a class="back" href="#/">← Home</a>
    <div class="sec-head" style="margin-top:14px"><span class="n">✎</span><h2>Keep this site updated &amp; make it public</h2></div>
    <div class="prose fade">
      <h3>How the guide is built</h3>
      <p>This whole site is a single file, <code>index.html</code>. Every recommendation is one entry in a list called <code>PLACES</code> near the top of the file's script. To change hours, a price, or add a new place, edit that list — no coding beyond copy-paste required. Each entry has plain fields: <code>name</code>, <code>hours</code>, <code>price</code>, <code>reservation</code>, <code>route</code>, <code>tips</code>, <code>official</code>, and so on.</p>

      <h3>Rodrigo's food picks, the “eat nearby” option &amp; the map</h3>
      <p>Rodrigo Fernández's shared Google list <i>«Sitios top en Japón»</i> lives in the script as <code>RESTAURANTS</code> (name, area, rating, price and coordinates). The <b><a href="#/eat" style="color:var(--lantern-dim)">Eat</a></b> page lists them by area; the <b><a href="#/map" style="color:var(--lantern-dim)">Map</a></b> plots them alongside every activity; and each activity page shows its closest few as an “Eat nearby” block (the <code>EAT</code> table holds the nearest matches, computed by straight-line distance). If Rodrigo adds places, re-run the small helper <code>_work/build.py</code> to regenerate <code>RESTAURANTS</code>, <code>EAT</code> and the <code>otsuka-map.kml</code> file — or just tell me and I'll do it.</p>
      <p>The <b><a href="#/map" style="color:var(--lantern-dim)">Map</a></b> page draws itself <b>live from the guide's own data</b> (Leaflet + OpenStreetMap) — things to do in red, Rodrigo's food in green, home in gold. Add a place to <code>PLACES</code> (with its coordinates in <code>ACT_COORDS</code>) and it appears on the map automatically on the next deploy — no Google My Maps re-imports. The same pins are always downloadable as <code>otsuka-map.kml</code> if you want a copy in Google My Maps or Apple Maps.</p>

      <h3>The shared calendar — two one-time steps</h3>
      <p>The <b><a href="#/calendar" style="color:var(--lantern-dim)">Cal</a></b> page embeds a Google Calendar named <b>Ōtsuka Summer 2026</b>. Every place has an <b>📅 Add to calendar</b> button that opens Google with the date &amp; time pre-filled — pick that calendar and Save, and the whole family sees it. For it to work, the calendar's owner does this once in <b>Google Calendar → Settings → Ōtsuka Summer 2026</b>:</p>
      <ol class="steps">
        <li><b>Make the embed visible to everyone.</b> Under <i>Access permissions for events</i>, tick <b>Make available to public</b> and choose <b>See all event details</b>. (Without this, the calendar on the site shows empty / “needs access”.)</li>
        <li><b>Let the family add events.</b> Under <i>Share with specific people or groups</i>, add each family member's Google email with permission <b>Make changes to events</b>. Then they can save events straight onto the shared calendar.</li>
      </ol>
      <p>To point the site at a different calendar, change <code>CAL_ID</code> in the script.</p>

      <h3>Make it public (free, ~2 minutes)</h3>
      <ol class="steps">
        <li><b>Easiest — Netlify Drop.</b> Go to <code>app.netlify.com/drop</code> and drag this <code>index.html</code> onto the page. You get a public link instantly to share with the family. To update later, drag the new file on again.</li>
        <li><b>GitHub Pages.</b> Create a free repo, upload <code>index.html</code>, then in Settings → Pages choose the main branch. Your site appears at <code>yourname.github.io/repo</code>. Good if you want a permanent address.</li>
        <li><b>Cloudflare Pages / Vercel.</b> Same idea — connect a folder or repo and it hosts the single file publicly.</li>
      </ol>
      <p>Because it's one self-contained file (fonts load from Google, maps open in Google Maps), it works anywhere with no build step and no server.</p>

      <h3>Keeping the info accurate</h3>
      <p>Opening times, prices and festival schedules for summer 2026 can shift, so each page links straight to the official site and to <b>live Google Maps routing from Ōtsuka</b> — those two buttons stay current even if a number here goes stale. Fields I couldn't verify are marked "confirm on official site" on purpose rather than guessed.</p>

      <h3>Want me to make changes?</h3>
      <p>Just tell me what changed — new opening hours, a place to add or drop, a firmed-up festival date, or a day-by-day itinerary for the family week — and I'll regenerate the file for you to re-upload.</p>
    </div>
  `;
  window.scrollTo(0,0);
}

function route(){
  const h = location.hash.replace(/^#\/?/,'');
  navEl.classList.remove('open'); menuBtn.setAttribute('aria-expanded','false');
  if(h===''||h==='/'){ return renderHome(); }
  const parts = h.split('/');
  if(parts[0]==='c'){ return renderCategory(parts[1]); }
  if(parts[0]==='p'){ return renderPlace(parts[1]); }
  if(parts[0]==='eat'){ return renderEat(); }
  if(parts[0]==='map'){ return renderMap(); }
  if(parts[0]==='calendar'){ return renderCalendar(); }
  if(parts[0]==='about'){ return renderAbout(); }
  return renderHome();
}

menuBtn.addEventListener('click',()=>{
  const open = navEl.classList.toggle('open');
  menuBtn.setAttribute('aria-expanded', open?'true':'false');
});
// "Add to calendar" & "Photos" buttons (inside cards, on detail pages, on the calendar page)
document.addEventListener('click',e=>{
  const ph = e.target.closest('.photos-btn');
  if(ph){ e.preventDefault(); e.stopPropagation(); window.open(photosUrl(ph.getAttribute('data-q')),'_blank','noopener'); return; }
  const b = e.target.closest('.cal-btn');
  if(b){ e.preventDefault(); e.stopPropagation(); openCalModal(b.getAttribute('data-place')); }
});
window.addEventListener('hashchange', route);
route();
</script>
